<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ranking Cooperativo HN — Race Activos</title>

<script src="data.js"></script>

<style>

:root{
  --bg:#eaf8fb;
  --text:#111827;
  --muted:#6b7280;
  --green:#16a34a;
  --cay:#0f766e;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:
    radial-gradient(circle at top left,#ffffff 0,#eaf8fb 38%,#dff3f7 100%);
  color:var(--text);
}

.page{
  width:100vw;
  height:100vh;
  position:relative;
  padding:26px 44px 76px;
}

.header{
  text-align:center;
  margin-bottom:18px;
}

.title{
  font-size:34px;
  font-weight:900;
  letter-spacing:.02em;
  text-shadow:2px 2px 0 #fff;
}

.subtitle{
  font-size:13px;
  color:var(--muted);
  font-weight:700;
  margin-top:4px;
}

.chart{
  position:relative;
  width:74vw;
  height:73vh;
  margin-top:8px;
}

.bar-row{
  position:absolute;
  left:0;
  width:100%;
  height:42px;

  display:grid;

  grid-template-columns:
      215px
      1fr
      140px;

  gap:10px;

  align-items:center;

  transition:
      transform .45s linear,
      opacity .25s linear;
}

.name{
  font-size:14px;
  font-weight:900;
  text-align:right;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding-right:6px;
}

.name.cay{
  color:var(--cay);
}

.track{
  height:31px;
  background:rgba(255,255,255,.68);
  border-radius:7px;
  overflow:visible;
  position:relative;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.05);
}

.bar{
  height:100%;
  border-radius:7px;

  display:flex;
  align-items:center;

  padding:0 12px;

  color:#111827;

  font-size:13px;
  font-weight:900;

  min-width:52px;

  transition:
      width .45s linear;

  box-shadow:0 3px 10px rgba(0,0,0,.12);

  position:relative;
}

.bar.cay{
  background:
      linear-gradient(
          90deg,
          #0f766e,
          #22c55e
      ) !important;

  color:white;
}

.rank-inside{
  font-size:15px;
  font-weight:900;
}

.value{
  font-size:14px;
  font-weight:900;
  white-space:nowrap;
  color:#111827;
}

.logo-float{
  position:absolute;
  right:-18px;
  top:50%;
  transform:translateY(-50%);
  width:36px;
  height:36px;
  border-radius:50%;
  background:white;
  padding:3px;
  box-shadow:0 3px 8px rgba(0,0,0,.18);
}

.logo-float img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.side{
  position:absolute;
  right:58px;
  bottom:92px;
  text-align:right;
}

.year{
  font-size:126px;
  font-weight:900;
  color:#2563eb;
  line-height:.84;
  letter-spacing:-.06em;
  opacity:.9;
}

.month{
  font-size:34px;
  font-weight:900;
  color:#111827;
}

.total{
  margin-top:8px;
  font-size:25px;
  font-weight:900;
  color:#00a651;
}

.controls{
  position:absolute;
  left:42px;
  right:42px;
  bottom:26px;

  display:flex;
  align-items:center;
  gap:14px;
}

button{
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:#111827;
  color:white;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

input[type=range]{
  flex:1;
  accent-color:#16a34a;
}

.period{
  width:115px;
  font-size:13px;
  font-weight:900;
  color:#374151;
}

.badge{
  position:absolute;
  top:28px;
  right:44px;
  background:#fff;
  border-radius:999px;
  padding:8px 16px;
  font-size:12px;
  font-weight:900;
  color:#0f766e;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
}

.footer{
  position:absolute;
  right:44px;
  bottom:28px;
  font-size:10px;
  color:#6b7280;
  font-weight:700;
}

</style>
</head>

<body>

<div class="page">

  <div class="badge">
    Ranking dinámico · Activos Netos
  </div>

  <div class="header">

    <div class="title">
      Top Cooperativas de Honduras
    </div>

    <div class="subtitle">
      Evolución mensual por activos netos · Fuente CONSUCOOP
    </div>

  </div>

  <div class="chart" id="chart"></div>

  <div class="side">

    <div class="year" id="yearBig">----</div>

    <div class="month" id="monthBig">—</div>

    <div class="total" id="totalSistema">—</div>

  </div>

  <div class="controls">

    <button id="btnPlay">▶</button>

    <input type="range"
           id="slider"
           min="0"
           value="0">

    <div class="period"
         id="periodLabel">—</div>

  </div>

  <div class="footer">
    CAYCSOL · Ranking Cooperativo Honduras
  </div>

</div>

<script>

const TOP_N = 18;

const CAMPO = 'activos_net';

const ROW_H = 42;

const SPEED = 0.010;

const MESES = {

  1:'Enero',
  2:'Febrero',
  3:'Marzo',
  4:'Abril',
  5:'Mayo',
  6:'Junio',
  7:'Julio',
  8:'Agosto',
  9:'Septiembre',
  10:'Octubre',
  11:'Noviembre',
  12:'Diciembre'
};

const COLORS = [

  '#f7a88c',
  '#d8b4ce',
  '#b9c2cc',
  '#d1d5db',
  '#bfdbfe',
  '#fde68a',
  '#fecaca',
  '#bae6fd',
  '#ddd6fe',
  '#bbf7d0',
  '#c7d2fe',
  '#fbcfe8',
  '#e5e7eb',
  '#fed7aa',
  '#a7f3d0',
  '#bfdbfe',
  '#fecdd3',
  '#ddd6fe'
];

let DATA = [];
let PERIODOS = [];
let IDX = {};

let progress = 0;
let playing = false;

const chart = document.getElementById('chart');
const slider = document.getElementById('slider');
const btnPlay = document.getElementById('btnPlay');

function slug(txt){

  return String(txt || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/ñ/g,'n')
    .replace(/[^a-z0-9]+/g,'_')
    .replace(/^_+|_+$/g,'');
}

function logoPath(coop){

  return './logos/' + slug(coop) + '.png';
}

function fmtMill(n){

  return (n / 1e6).toLocaleString(undefined,{
    maximumFractionDigits:0
  }) + ' Mill';
}

function fallbackLogo(img){

  img.style.display = 'none';

  img.parentElement.innerHTML = '🏦';

  img.parentElement.style.fontSize = '22px';
}

function lerp(a,b,t){

  return a + (b-a)*t;
}

function getRows(periodo){

  return IDX[periodo]
      ? Object.values(IDX[periodo])
      : [];
}

function renderInterpolated(a,b,t){

  const p1 = PERIODOS[a];
  const p2 = PERIODOS[b];

  const r1 = getRows(p1);
  const r2 = getRows(p2);

  const map = {};

  [...r1,...r2].forEach(x=>{

    const key = slug(x.coop);

    if(map[key]) return;

    const d1 = r1.find(v=>slug(v.coop)===key);
    const d2 = r2.find(v=>slug(v.coop)===key);

    map[key] = {

      coop:x.coop,

      value:
        lerp(
          d1?.[CAMPO] || 0,
          d2?.[CAMPO] || 0,
          t
        )
    };
  });

  const sorted = Object.values(map)

    .sort((a,b)=>b.value-a.value)

    .slice(0,TOP_N);

  const max = sorted[0]?.value || 1;

  const totalSistema = sorted.reduce(
      (s,d)=>s+d.value,
      0
  );

  const [anio,mesTxt] = p1.split('-');

  const mes = parseInt(mesTxt);

  document.getElementById('yearBig').textContent =
      anio;

  document.getElementById('monthBig').textContent =
      MESES[mes];

  document.getElementById('periodLabel').textContent =
      MESES[mes] + ' ' + anio;

  document.getElementById('totalSistema').textContent =
      'Activos Netos: ' + fmtMill(totalSistema);

  const existentes = new Set();

  sorted.forEach((d,i)=>{

    const key = slug(d.coop);

    existentes.add(key);

    let row = document.getElementById('row_' + key);

    const pct =
      Math.max((d.value/max)*100,2);

    const isCay =
      d.coop.includes('CAYCSOL');

    if(!row){

      row = document.createElement('div');

      row.className = 'bar-row';

      row.id = 'row_' + key;

      row.innerHTML = `

        <div class="name ${isCay?'cay':''}">
          ${d.coop}
        </div>

        <div class="track">

          <div class="bar ${isCay?'cay':''}"
               id="bar_${key}">

            <span class="rank-inside">
              #${i+1}
            </span>

            <div class="logo-float">

              <img src="${logoPath(d.coop)}"
                   onerror="fallbackLogo(this)">

            </div>

          </div>

        </div>

        <div class="value"
             id="val_${key}">
        </div>
      `;

      chart.appendChild(row);
    }

    row.style.opacity = '1';

    row.style.transform =
      `translateY(${i * ROW_H}px)`;

    const bar =
      document.getElementById('bar_' + key);

    const val =
      document.getElementById('val_' + key);

    const name =
      row.querySelector('.name');

    name.classList.toggle('cay',isCay);

    bar.classList.toggle('cay',isCay);

    bar.style.width = pct + '%';

    if(!isCay){

      bar.style.background =
        COLORS[i % COLORS.length];
    }

    bar.innerHTML = `

      <span class="rank-inside">
        #${i+1}
      </span>

      <div class="logo-float">

        <img src="${logoPath(d.coop)}"
             onerror="fallbackLogo(this)">

      </div>
    `;

    val.textContent = fmtMill(d.value);
  });

  document.querySelectorAll('.bar-row')
    .forEach(row=>{

      const key =
        row.id.replace('row_','');

      if(!existentes.has(key)){

        row.style.opacity = '0';

        row.style.transform =
          `translateY(${TOP_N * ROW_H}px)`;
      }
    });

  slider.value = a;
}

function animate(){

  if(!playing) return;

  progress += SPEED;

  const actual =
      Math.floor(progress);

  const siguiente =
      Math.min(
          actual + 1,
          PERIODOS.length - 1
      );

  const blend =
      progress - actual;

  renderInterpolated(
      actual,
      siguiente,
      blend
  );

  if(progress >= PERIODOS.length-1){

    progress = 0;
  }

  requestAnimationFrame(animate);
}

function togglePlay(){

  playing = !playing;

  btnPlay.textContent =
      playing ? '⏸' : '▶';

  if(playing){

    requestAnimationFrame(animate);
  }
}

RD.loadBalanceGeneral()

.then(raw=>{

  DATA = RD.agrupar(raw,[

    'activos_net',
    'activos_tot',
    'prestamos',
    'pasivos',
    'obligaciones',
    'patrimonio',
    'provisiones'
  ]);

  PERIODOS = RD.periodos(DATA);

  IDX = RD.buildIndex(DATA);

  slider.max =
      PERIODOS.length - 1;

  slider.addEventListener('input',e=>{

    progress = Number(e.target.value);

    renderInterpolated(
        progress,
        Math.min(
          progress+1,
          PERIODOS.length-1
        ),
        0
    );
  });

  btnPlay.addEventListener(
      'click',
      togglePlay
  );

  renderInterpolated(0,1,0);
})

.catch(err=>{

  chart.innerHTML = `

    <div style="
      font-size:22px;
      font-weight:900;
      color:#b91c1c
    ">

      Error cargando datos:
      ${err.message}

    </div>
  `;
});

</script>

</body>
</html>
